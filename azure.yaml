# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: ot-tag-registry
metadata:
  template: ot-tag-registry
infra:
  provider: bicep
  path: azure
hooks:
  preprovision:
    windows:
      shell: pwsh
      run: '& "C:/Program Files/Git/bin/bash.exe" azure/hooks/preprovision.sh'
    posix:
      shell: sh
      run: azure/hooks/preprovision.sh
  postprovision:
    windows:
      shell: pwsh
      run: '& "C:/Program Files/Git/bin/bash.exe" azure/hooks/postprovision.sh'
    posix:
      shell: sh
      run: azure/hooks/postprovision.sh
